name: Sync Upstream Content
on:
  schedule:
    - cron: '0 2 * * *'     # 02:00 UTC daily
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run content sync
        run: bash scripts/sync-content.sh

      - name: Parse and generate JSON
        run: node scripts/parse-content.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request if content changed
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(sync): upstream content update ${{ github.run_id }}"
          title: "🔄 Upstream content sync"
          body: |
            Automated content sync from upstream repositories.
            **Changed files:** `src/data/`
            **Triggered by:** Daily schedule
            Review the diff and merge to deploy to production.
          branch: sync/upstream-${{ github.run_id }}
          base: develop
          labels: "automated, content-sync"
