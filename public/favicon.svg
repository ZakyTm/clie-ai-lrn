<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>
    path {
      stroke: #0e3e26; /* Default forest green for light mode browser tabs */
    }
    .accent {
      stroke: #e0a96d; /* Accent gold */
    }
    @media (prefers-color-scheme: dark) {
      path {
        stroke: #c2e9c2; /* Light high-contrast green for dark browser tabs */
      }
      .accent {
        stroke: #e0a96d;
      }
    }
  </style>
  <!-- Outer C (Accent) -->
  <path d="M 22 8 H 8 V 20 H 22" class="accent" />
  <!-- Outer L (Accent) -->
  <path d="M 8 20 V 26 H 25" class="accent" />
  
  <!-- Inner A -->
  <path d="M 11 17 L 15 11 L 19 17" />
  <path d="M 13 15 H 17" />
  <!-- Inner I -->
  <path d="M 22 11 V 17" />
  <path d="M 20.5 11 H 23.5" />
  <path d="M 20.5 17 H 23.5" />
</svg>
