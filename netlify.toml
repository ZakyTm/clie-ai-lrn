[build]
  command = "chmod +x scripts/sync-content.sh && bash scripts/sync-content.sh && node scripts/parse-content.mjs && npm run build"
  publish = "dist"
  base = "."
[build.environment]
  NODE_VERSION = "20"
# Redirects
[[redirects]]
  from = "/knowledge"
  to = "/knowledge/"
  status = 301
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404
# Global security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options                  = "DENY"
    X-Content-Type-Options           = "nosniff"
    X-XSS-Protection                 = "1; mode=block"
    Referrer-Policy                  = "strict-origin-when-cross-origin"
    Strict-Transport-Security        = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy               = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy          = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
# Aggressive cache for static assets (Astro hashes filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
# Never cache HTML (so content updates propagate immediately)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
# Never cache JSON data files
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=60"
# Pagefind search assets
[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
